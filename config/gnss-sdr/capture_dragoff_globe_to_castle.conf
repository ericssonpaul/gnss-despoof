[GNSS-SDR]

;######### GLOBAL OPTIONS ##################
GNSS-SDR.internal_fs_sps=2600000
GNSS-SDR.telecommand_enabled=true
GNSS-SDR.telecommand_tcp_port=1325

;######### SIGNAL_SOURCE CONFIG ############
SignalSource.implementation=File_Signal_Source
SignalSource.filename=iq_samples/capture_dragoff_globe_to_castle.bin
SignalSource.item_type=ibyte
SignalSource.sampling_frequency=2600000
SignalSource.freq=1575420000
SignalSource.samples=0
SignalSource.repeat=false
SignalSource.enable_throttle_control=true

;######### SIGNAL_CONDITIONER CONFIG ############
SignalConditioner.implementation=Signal_Conditioner

;######### DATA_TYPE_ADAPTER CONFIG ############
; converts interleaved I/Q samples to gr_complex<float> for the rest of the chain
DataTypeAdapter.implementation=Ibyte_To_Complex

;######### INPUT_FILTER CONFIG ############
InputFilter.implementation=Pass_Through

;######### RESAMPLER CONFIG ############
; sample rate is already low and matches internal_fs_sps, no resampling needed
Resampler.implementation=Pass_Through

;######### CHANNELS GLOBAL CONFIG ############
Channels_1C.count=8
Channels.in_acquisition=1
Channel.signal=1C

;######### ACQUISITION GPS L1 C/A CONFIG ############
Acquisition_1C.implementation=GPS_L1_CA_PCPS_Acquisition
Acquisition_1C.item_type=gr_complex
Acquisition_1C.if=0
Acquisition_1C.coherent_integration_time_ms=1
Acquisition_1C.threshold=0.01
Acquisition_1C.pfa=0.01
Acquisition_1C.doppler_max=10000
Acquisition_1C.doppler_step=250
Acquisition_1C.bit_transition_flag=false
Acquisition_1C.max_dwells=1
Acquisition_1C.dump=false
Acquisition_1C.dump_filename=./capture_dragoff_globe_to_castle_acq_dump.dat

;######### TRACKING GPS L1 C/A CONFIG ############
Tracking_1C.implementation=GPS_L1_CA_DLL_PLL_Tracking
Tracking_1C.item_type=gr_complex
Tracking_1C.if=0
Tracking_1C.dump=false
Tracking_1C.dump_filename=./capture_dragoff_globe_to_castle_tracking_ch_
Tracking_1C.pll_bw_hz=40.0
Tracking_1C.dll_bw_hz=4.0
Tracking_1C.order=3
Tracking_1C.early_late_space_chips=0.5

;######### TELEMETRY DECODER GPS L1 C/A CONFIG ############
TelemetryDecoder_1C.implementation=GPS_L1_CA_Telemetry_Decoder
TelemetryDecoder_1C.dump=false

;######### OBSERVABLES CONFIG ############
Observables.implementation=Hybrid_Observables
Observables.dump=false
Observables.dump_filename=./capture_dragoff_globe_to_castle_observables.dat

;######### PVT CONFIG ############
PVT.implementation=RTKLIB_PVT
PVT.positioning_mode=Single
PVT.iono_model=OFF
PVT.trop_model=OFF
PVT.output_rate_ms=100
PVT.display_rate_ms=500
PVT.dump=false
PVT.dump_filename=./capture_dragoff_globe_to_castle_PVT
PVT.nmea_dump_filename=./capture_dragoff_globe_to_castle_gnss_sdr_pvt.nmea
PVT.flag_nmea_tty_port=false
PVT.flag_rtcm_server=false
PVT.flag_rtcm_tty_port=false
PVT.rinex_version=3
PVT.rinex_output_enabled=true
PVT.kml_output_enabled=true
PVT.gpx_output_enabled=false
PVT.geojson_output_enabled=false
PVT.xml_output_enabled=false

;######### MONITOR CONFIG ############
; assumes a single gnss-sdr instance; bump these ports if running several at once
PVT.enable_monitor=true
PVT.monitor_client_addresses=127.0.0.1
PVT.monitor_udp_port=1324

Monitor.enable_monitor=true
Monitor.decimator_factor=50
Monitor.client_addresses=127.0.0.1
Monitor.udp_port=1323
